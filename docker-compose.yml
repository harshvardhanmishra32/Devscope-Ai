version: "3.8"

services:
  # 1. Relational Database
  db:
    image: postgres:15-alpine
    container_name: devscope_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: devscope
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. Redis Cache & Message Broker
  redis:
    image: redis:7-alpine
    container_name: devscope_redis
    restart: always
    ports:
      - "6379:6379"

  # 3. FastAPI Core Backend Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devscope_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/devscope
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=super-secret-development-key-change-in-production-1234567890
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  # 4. Celery Worker for long-running analyses
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devscope_celery
    command: celery -A backend.app.tasks.celery_worker.celery_app worker --loglevel=info
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/devscope
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

  # 5. Next.js Frontend Client
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: devscope_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
