name: DevScope AI CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # 1. Backend Code Lint and Test
  backend-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    - name: Run Pytest
      run: |
        cd backend
        pytest -v

  # 2. Frontend Build Verification
  frontend-build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package.json

    - name: Install dependencies
      run: |
        cd frontend
        npm install

    - name: Build NextJS Boilerplate
      run: |
        cd frontend
        npm run build

  # 3. Docker Image Build & Push
  docker-delivery:
    needs: [backend-test, frontend-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: actions/setup-buildx-action@v3

    - name: Build and Package Backend Container
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: false
        tags: devscope/backend:latest

    - name: Build and Package Frontend Container
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: false
        tags: devscope/frontend:latest
